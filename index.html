<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Witch's Winter</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Witch's Winter Gold.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Witch's Winter Gold.data",
        frameworkUrl: buildUrl + "/Witch's Winter Gold.framework.js",
        codeUrl: buildUrl + "/Witch's Winter Gold.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Witch's Winter",
        productVersion: "1.0",
        showBanner: unityShowBanner,
      };

      // Render at exactly 1920x1080 internally (matches Unity editor)
      config.matchWebGLToCanvasSize = false;

      // Scale canvas to fit browser/iframe while keeping 16:9 aspect ratio
      function fitCanvas() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        var targetRatio = 1920 / 1080;
        var windowRatio = w / h;
        var scale;
        if (windowRatio > targetRatio) {
          scale = h / 1080;
        } else {
          scale = w / 1920;
        }
        canvas.style.width = Math.floor(1920 * scale) + "px";
        canvas.style.height = Math.floor(1080 * scale) + "px";
      }

      fitCanvas();
      window.addEventListener("resize", fitCanvas);

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
